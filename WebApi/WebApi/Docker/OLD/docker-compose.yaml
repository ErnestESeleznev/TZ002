services:
 db:
    container_name: postgresDB
    image: postgres:15.1
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      #- postgres:/var/lib/postgresql/data
      - ./script.sql:/script.sql
    post_start:
      - command: /bin/bash -c "until pg_isready -U postgres ; do sleep 1; done; psql -U postgres -c 'create database db_test;'"
      - command: /bin/bash -c "psql -U postgres -d db_test -f /script.sql"

 rabbitmq:
    image: rabbitmq:3.10.7-management
    container_name: mq
    restart: always
    ports:
      - 15672:15672
      - 5672:5672

 app:
    image: i_app
    container_name: c_app
    restart: always
    build:
      context: .
    depends_on:
      - db
      - rabbitmq
    ports:
      - '80:80'
      - '8080:8080'
